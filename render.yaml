services:
  - type: web
    name: tenant-autopilot-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USERNAME
        value: neo4j
      - key: NEO4J_PASSWORD
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: MAX_FILE_SIZE_MB
        value: "10"
      - key: RATE_LIMIT_PER_MINUTE
        value: "20"
